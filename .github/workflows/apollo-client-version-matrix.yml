name: Apollo Client Version Matrix

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        apolloVersion: ["2", "3", "4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install default dependencies
        run: npm ci

      - name: Install Apollo v2 runtime deps
        if: matrix.apolloVersion == '2'
        run: npm install @apollo/client@0.0.0 -D --no-save || true

      - name: Install Apollo v2 compatibility deps
        if: matrix.apolloVersion == '2'
        run: npm install apollo-link@1.2.14 apollo-utilities@1.3.4 -D --no-save

      - name: Install Apollo v3 deps
        if: matrix.apolloVersion == '3'
        run: npm install @apollo/client@^3 -D --no-save

      - name: Install Apollo v4 deps
        if: matrix.apolloVersion == '4'
        run: npm install @apollo/client@^4 -D --no-save

      - name: Build
        run: npm run build

      - name: Run Apollo compatibility smoke test
        run: npm run test:apollo-compat
